# ─── ETAPA 4: Kubernetes – Service ───────────────────────────────
# Expone la API externamente como NodePort para acceso local
apiVersion: v1
kind: Service
metadata:
  name: heart-disease-service
  labels:
    app: heart-disease-api
spec:
  type: NodePort
  selector:
    app: heart-disease-api
  ports:
    - protocol: TCP
      port: 80           # Puerto del Service dentro del cluster
      targetPort: 8000   # Puerto del contenedor
      nodePort: 30080    # Puerto accesible desde el host (minikube ip:30080)
