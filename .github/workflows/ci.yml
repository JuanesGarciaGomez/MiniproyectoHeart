# ─── ETAPA 5: Integración Continua – GitHub Actions ──────────────
# Se ejecuta en cada push a main o en Pull Requests.
# Pasos: linting (flake8) → tests automáticos (pytest) → build Docker

name: CI – Heart Disease API

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    name: Lint + Tests
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout del código
      - name: Checkout
        uses: actions/checkout@v4

      # 2. Configurar Python
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # 3. Instalar dependencias
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r docker/requirements.txt
          pip install flake8 pytest httpx

      # 4. Linting con flake8
      - name: Lint (flake8)
        run: |
          flake8 app/api.py \
            --max-line-length=100 \
            --ignore=E501,W503 \
            --count --statistics

      # 5. Tests automáticos con pytest
      - name: Run tests
        run: |
          pytest tests/ -v --tb=short

  build-docker:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: lint-and-test          # Solo buildea si los tests pasan

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Docker image
        run: |
          docker build \
            -f docker/Dockerfile \
            -t heart-disease-api:${{ github.sha }} \
            -t heart-disease-api:latest \
            .

      - name: Smoke test container
        run: |
          docker run -d --name heart-api -p 8000:8000 heart-disease-api:latest
          sleep 5
          curl --fail http://localhost:8000/health
          docker stop heart-api
